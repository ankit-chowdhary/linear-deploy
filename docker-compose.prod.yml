# Requires Docker Compose v2 (the `docker compose` plugin).
# bootstrap.sh installs it; the legacy `docker-compose` v1.x has a
# known KeyError: 'ContainerConfig' bug and is no longer supported.
# Project name comes from the directory name (no top-level `name:`).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
      PGUSER: ${PG_USER}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${PG_USER} -d $${PG_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      SERVER_ADDR: ":8080"
      DATABASE_URL: "postgres://${PG_USER}:${PG_PASSWORD}@postgres:5432/${PG_DB}?sslmode=disable"
      REDIS_URL: "redis://redis:6379/0"
      JWT_SECRET: ${JWT_SECRET}
      REPORT_API_KEY: ${REPORT_API_KEY}
      ALLOWED_ORIGINS: "https://${DOMAIN}"
      ENVIRONMENT: production
    ports:
      - "127.0.0.1:8080:8080"
    # Healthcheck disabled because the distroless image has no shell
    # or wget. Caddy + the app itself verify health via real traffic.
    # If you want healthchecks, bake a minimal binary into the image.

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    expose: ["80"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
      LE_EMAIL: ${LE_EMAIL}
    depends_on: [backend, frontend]

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
